<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Which Rapper Are You?</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #53118d, #6f04f2);
    color: white;
    text-align: center;
    margin: 0;
}

.container {
    max-width: 500px;
    margin: 40px auto;
    padding: 20px;
    background: #410653;
    border-radius: 20px;
    box-shadow: 0 0 20px rgba(255,0,0,0.2);
}

h1 {
    color: #e4f9f7;
}

.question {
    margin: 20px 0;
    text-align: left;
}

button.option {
    width: 100%;
    padding: 12px;
    margin: 5px 0;
    border: none;
    border-radius: 12px;
    background: #222;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

button.option:hover {
    background: #6a0d6e;
}

button.option.selected {
    background: #610c69;
}


#result {
    margin-top: 20px;
    font-size: 12px;
    font-weight: bold;
    color: #fff;
    text-shadow: 0 0 10px rgba(126, 12, 109, 0.779);
}

.b1 {
    background-color: #6f04f2;
    color: white;
    border: none;
    padding: 15px 32px;
    font-size: 16px;
    cursor: pointer;
    border-radius: 10px;
    transition: background-color 0.3s ease;
}

.b1:hover {
    background-color: #000000a4;
    color: rgb(255, 255, 255);
}
canvas {
    margin-top: 30px;
 
    max-height: 300px;
}


#gifBox {
    margin-top: 30px;
    display: flex;
    justify-content: center;
    align-items: center;
}

#resultGif {
    max-width: 100%;
    width: 320px;
    border-radius: 16px;
    box-shadow: 0 0 20px rgba(0,0,0,0.35);
}
</style>
</head>

<body>

<div class="container">
    <h1>🎤 Which Rapper Are You?</h1>
    <div id="quiz"></div>
    <button class="b1" onclick="showResult()">Show Result</button>
    <div id="result"></div>
<div id="gifBox">
    <img id="resultGif" src="" alt="Result GIF" style="display: none;">
</div>
</div>

<script>
const questions = [
{
q: "How do you usually spend a free day?",
a: [["I work on self-improvement","A"],["I spend time thinking alone","B"],["I stay active and productive","C"],["I hang out and have fun","D"]]
},
{
q: "How do you react when facing a problem?",
a: [["I confront it and solve it","A"],["I analyze it deeply","B"],["I act quickly and fix it","C"],["I don’t stress too much about it","D"]]
},
{
q: "What matters most in music for you?",
a: [["Technique and flow","A"],["Meaningful lyrics","B"],["Vibe and trends","C"],["Energy and fun","D"]]
},
{
q: "How would your friends describe you?",
a: [["Disciplined and strong","A"],["Deep and thoughtful","B"],["Ambitious and driven","C"],["Relaxed and fun","D"]]
},
{
q: "What motivates you the most in life?",
a: [["Success and respect","A"],["Understanding life","B"],["Growth and progress","C"],["Enjoying the moment","D"]]
},
{
q: "How do you approach your goals?",
a: [["With a clear plan and discipline","A"],["I reflect before acting","B"],["I start fast and adapt","C"],["I go with the flow","D"]]
},
{
q: "How are you in social situations?",
a: [["Calm but impactful","A"],["Observant and quiet","B"],["Active and talkative","C"],["Energetic and entertaining","D"]]
},
{
q: "How do you deal with tough times?",
a: [["I become stronger","A"],["I question everything","B"],["I focus on solutions","C"],["I distract myself","D"]]
},
{
q: "Which life philosophy fits you best?",
a: [["Work hard and earn respect","A"],["Think deeply and understand","B"],["Improve and move forward","C"],["Live and enjoy life","D"]]
},
{
q: "What do you admire most in people?",
a: [["Discipline","A"],["Depth","B"],["Determination","C"],["Positive energy","D"]]
}
];

let answers = {};

function loadQuiz() {
    const quiz = document.getElementById("quiz");
    quiz.innerHTML = "";

    questions.forEach((q, i) => {
        let html = `<div class="question" id="question-${i}">
                        <h3>${i + 1}. ${q.q}</h3>`;

        q.a.forEach(opt => {
            html += `<button class="option" onclick="selectAnswer(${i}, '${opt[1]}', this)">${opt[0]}</button>`;
        });

        html += `</div>`;
        quiz.innerHTML += html;
    });
}

function selectAnswer(qIndex, val, el) {
    answers[qIndex] = val;

    let buttons = el.parentElement.querySelectorAll(".option");
    buttons.forEach(btn => btn.classList.remove("selected"));
    el.classList.add("selected");

    el.parentElement.style.border = "none";
}

function showResult() {
    if (Object.keys(answers).length < questions.length) {
        document.getElementById("result").innerText = "Please answer all questions before seeing your result.";

        for (let i = 0; i < questions.length; i++) {
            if (!(i in answers)) {
                const unanswered = document.getElementById(`question-${i}`);
                unanswered.style.border = "2px solid #ff4d4d";
                unanswered.style.borderRadius = "12px";
                unanswered.style.padding = "10px";
                unanswered.scrollIntoView({ behavior: "smooth", block: "center" });
                break;
            }
        }
        return;
    }

    let count = { A: 0, B: 0, C: 0, D: 0 };

    Object.values(answers).forEach(answer => {
        count[answer]++;
    });

    let max = Object.keys(count).reduce((a, b) => count[a] > count[b] ? a : b);

    let text = "";
   if(max==="A"){
        text = "You are CEZA 🔥\n\nYou are a disciplined and strong individual who values respect and personal growth. You don’t back down easily, and when life gets tough, you push even harder. People may see you as serious or intense, but deep down, you are someone who believes in hard work and consistency. You are not here to follow others — you are here to prove yourself.";
    }

    if(max==="B"){
        text = "You are SAGOPA 🌙\n\nYou have a deep and thoughtful personality. You tend to question life, emotions, and everything around you. While others move on quickly, you prefer to understand things on a deeper level. Sometimes you may overthink, but this is also what makes you unique. You feel things intensely, and your mind is always searching for meaning.";
    }

    if(max==="C"){
        text = "You are MOTIVE ⚡\n\nYou are ambitious, modern, and always looking forward. You don’t like staying in one place — you want progress, growth, and success. You adapt quickly to new situations and trends, and you are not afraid to take risks. Your energy comes from your goals, and you are constantly pushing yourself to become better.";
    }

    if(max==="D"){
        text = "You are LVBEL C5 🎉\n\nYou are relaxed, fun, and full of energy. You don’t overcomplicate life — you prefer to enjoy the moment and keep things light. People feel comfortable around you because of your positive vibe. You may not take everything too seriously, but that’s exactly what makes you stand out. You bring fun wherever you go.";
    }

    document.getElementById("result").innerText = text;

    showGif(max);
    saveResults(count);
}

function showGif(result) {
    const gif = document.getElementById("resultGif");

    const gifs = {
        A: "ceza.gif",
        B: "sagopa.gif",
        C: "motive.gif",
        D: "lvbelc5.gif"
    };

    gif.src = gifs[result];
    gif.style.display = "block";
}

function saveResults(data) {
    localStorage.setItem("quizResults", JSON.stringify(data));
}

loadQuiz();
</script>

</body>
</html>
